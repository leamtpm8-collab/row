<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Maëls Übersicht">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/apple-touch-icon-167.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<title>Maëls Übersicht</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<link rel="stylesheet" href="theme.css">
<style>
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text-2);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(110, 231, 183, 0.14), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(110, 231, 183, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0,0,0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page { max-width: 1100px; margin: 0 auto; }
.dash-title { margin: 0 0 4px; font-size: 30px; }
.dash-sub { margin: 0 0 20px; }
@media (max-width: 480px) { .dash-title { font-size: 24px; } }

.rw-card.big  .rw-card-icon { font-size: 26px; }
.rw-card.big  .rw-card-title { font-size: 24px; }
</style>
</head>
<body>
<div class="page">

  <h1 class="dash-title rw-title">Guten Tag, Maël</h1>
  <div class="dash-sub rw-eyebrow" id="idxDateLabel">—</div>

  <div class="rw-grid">

    <a href="main.html" class="rw-card big">
      <div class="rw-motif motif-dots" style="--dot-x:66%;--dot-y:38%"></div>
      <div class="rw-card-num">·01</div>
      <span class="rw-card-icon">🏠</span>
      <div class="rw-card-spacer"></div>
      <div class="rw-card-title">Start</div>
      <div class="rw-card-foot">
        <span class="rw-card-sub">Ziele &amp; Tagesplan</span>
        <span class="rw-card-arrow">→</span>
      </div>
    </a>

    <a href="daily.html" class="rw-card wide">

    <a href="po-water.html" class="rw-card">

      </div>
      <div class="rw-card-num">·04</div>
      <span class="rw-card-icon">💧</span>

        <span class="rw-card-sub">Flüssigkeitszufuhr</span>

    <a href="fitness.html" class="rw-card wide">

      </div>
      <div class="rw-card-num">·05</div>

        <span class="rw-card-arrow">→</span>

    <a href="books.html" class="rw-card">

    <a href="finance.html" class="rw-card">
      <div class="rw-motif motif-bars"><span></span><span></span><span></span><span></span></div>

      <span class="rw-card-icon">📊</span>
      <div class="rw-card-spacer"></div>
      <div class="rw-card-title">Finanzen</div>
      <div class="rw-card-foot">
        <span class="rw-card-sub">Vermögen &amp; Ausgaben</span>
        <span class="rw-card-arrow">→</span>
      </div>
    </a>

  </div>

</div>
<script>
(function () {
  var days = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  var mons = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  var now = new Date();
  var el = document.getElementById('idxDateLabel');
  if (el) el.textContent = days[now.getDay()] + ', ' + now.getDate() + '. ' + mons[now.getMonth()];
})();
</script>
</body>
</html>
