<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Anmelden — Maëls Übersicht</title>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; height: 100%;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
}
body {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  position: relative; overflow: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -1;
}
.card {
  width: 100%; max-width: 360px;
  padding: 32px 28px;
  border-radius: 18px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
}
h1 {
  margin: 0 0 24px;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
label { display: block; font-size: 13px; color: var(--text-tertiary); margin-bottom: 6px; }
input[type="password"] {
  width: 100%;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.10);
  background: rgba(255, 255, 255, 0.03);
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 15px;
  outline: none;
}
input[type="password"]:focus { border-color: rgba(224, 118, 88, 0.6); }
.remember {
  display: flex; align-items: center; gap: 8px;
  margin: 16px 0 20px;
  font-size: 14px; color: var(--text-secondary);
  user-select: none;
}
.remember input { width: 16px; height: 16px; accent-color: #E07658; }
button.submit {
  width: 100%;
  padding: 12px 14px;
  border: none; border-radius: 12px;
  background: linear-gradient(180deg, rgba(224, 118, 88, 0.85), rgba(224, 118, 88, 0.65));
  color: #FFFFFF; font-family: var(--font); font-size: 15px; font-weight: 700;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s ease, opacity 0.15s ease;
}
button.submit:active { transform: scale(0.98); }
button.submit:disabled { opacity: 0.6; cursor: default; }
.error {
  margin-top: 14px;
  font-size: 13px;
  color: var(--danger);
  min-height: 16px;
}
</style>
</head>
<body>
<div class="card">
  <h1>Anmelden</h1>
  <form id="loginForm" autocomplete="on">
    <label for="password">Passwort</label>
    <input type="password" id="password" name="password" autocomplete="current-password" autofocus required>
    <label class="remember" for="remember">
      <input type="checkbox" id="remember" name="remember">
      Angemeldet bleiben
    </label>
    <button type="submit" class="submit" id="submitBtn">Anmelden</button>
    <div class="error" id="error"></div>
  </form>
</div>
<script>
(function () {
  'use strict';
  var form = document.getElementById('loginForm');
  var passwordEl = document.getElementById('password');
  var rememberEl = document.getElementById('remember');
  var errorEl = document.getElementById('error');
  var submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    errorEl.textContent = '';
    submitBtn.disabled = true;
    fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: passwordEl.value, remember: rememberEl.checked })
    }).then(function (res) {
      if (res.ok) {
        window.location.href = '/index.html';
        return;
      }
      submitBtn.disabled = false;
      errorEl.textContent = 'Falsches Passwort.';
      passwordEl.value = '';
      passwordEl.focus();
    }).catch(function () {
      submitBtn.disabled = false;
      errorEl.textContent = 'Verbindungsfehler — bitte erneut versuchen.';
    });
  });
})();
</script>
</body>
</html>
