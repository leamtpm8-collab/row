<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Maëls Übersicht">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/apple-touch-icon-167.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<title>Anmelden — Maëls Übersicht</title>
<link rel="stylesheet" href="theme.css">
<style>
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; height: 100%;
  background: var(--bg);
  color: var(--text-2);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
}
body {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  position: relative; overflow: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(110, 231, 183, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -1;
}
.card {
  position: relative;
  overflow: hidden;
  width: 100%; max-width: 360px;
  padding: 32px 28px;
  border-radius: var(--radius);
  background: var(--bg-card);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-card);
}
/* keeps real content above the absolutely-positioned .rw-motif background layer */
.card-content { position: relative; z-index: 2; }
h1 {
  margin: 0 0 24px;
  font-size: 22px;
  letter-spacing: -0.01em;
}
label { display: block; font-size: 13px; color: var(--text-3); margin-bottom: 6px; }
input[type="password"] {
  width: 100%;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.10);
  background: rgba(255, 255, 255, 0.03);
  color: var(--text-1);
  font-family: var(--font);
  font-size: 15px;
  outline: none;
}
input[type="password"]:focus { border-color: var(--accent-glow); }
.remember {
  display: flex; align-items: center; gap: 8px;
  margin: 16px 0 20px;
  font-size: 14px; color: var(--text-2);
  user-select: none;
}
.remember input { width: 16px; height: 16px; accent-color: var(--accent); }
button.submit {
  width: 100%;
  padding: 12px 14px;
  border: none; border-radius: 12px;
  background: linear-gradient(180deg, var(--accent), #4ED4A0);
  color: #04201A; font-family: var(--font); font-size: 15px; font-weight: 700;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s ease, opacity 0.15s ease;
}
button.submit:active { transform: scale(0.98); }
button.submit:disabled { opacity: 0.6; cursor: default; }
.error {
  margin-top: 14px;
  font-size: 13px;
  color: var(--bad);
  min-height: 16px;
}
</style>
</head>
<body>
<div class="card">
  <div class="rw-motif motif-dots" style="--dot-x:80%;--dot-y:20%"></div>
  <div class="card-content">
  <h1 class="rw-title">Anmelden</h1>
  <form id="loginForm" autocomplete="on">
    <label for="password">Passwort</label>
    <input type="password" id="password" name="password" autocomplete="current-password" autofocus required>
    <label class="remember" for="remember">
      <input type="checkbox" id="remember" name="remember">
      Angemeldet bleiben
    </label>
    <button type="submit" class="submit" id="submitBtn">Anmelden</button>
    <div class="error" id="error"></div>
  </form>
  </div>
</div>
<script>
(function () {
  'use strict';
  var form = document.getElementById('loginForm');
  var passwordEl = document.getElementById('password');
  var rememberEl = document.getElementById('remember');
  var errorEl = document.getElementById('error');
  var submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    errorEl.textContent = '';
    submitBtn.disabled = true;
    fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: passwordEl.value, remember: rememberEl.checked })
    }).then(function (res) {
      if (res.ok) {
        window.location.href = '/main.html';
        return;
      }
      submitBtn.disabled = false;
      errorEl.textContent = 'Falsches Passwort.';
      passwordEl.value = '';
      passwordEl.focus();
    }).catch(function () {
      submitBtn.disabled = false;
      errorEl.textContent = 'Verbindungsfehler — bitte erneut versuchen.';
    });
  });

  // Block pinch-zoom and double-tap-zoom, same as topbar.js's lockGestures()
  // on every other page — this is the one page that doesn't load topbar.js.
  function blockGesture(e) { e.preventDefault(); }
  document.addEventListener('gesturestart', blockGesture, { passive: false });
  document.addEventListener('gesturechange', blockGesture, { passive: false });
  document.addEventListener('gestureend', blockGesture, { passive: false });
  var lastTouch = 0;
  document.addEventListener('touchend', function (e) {
    var now = Date.now();
    if (now - lastTouch <= 300) e.preventDefault();
    lastTouch = now;
  }, { passive: false });
})();
</script>
</body>
</html>
