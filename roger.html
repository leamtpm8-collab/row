<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#05060c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Roger · KI-Assistent</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="topbar.js" defer></script>
<!-- ============================================================
 * ROGER — persönlicher KI-Assistent für das Dashboard.
 * Einzelne, in sich geschlossene Datei. Kein Backend, kein Build-Schritt.
 *
 * FUNKTIONSWEISE (eigener API-Schlüssel):
 *   • Der Nutzer fügt seinen EIGENEN Anthropic-API-Schlüssel ein (nur im
 *     Browser-localStorage gespeichert — geht nirgendwo außer an Anthropic).
 *   • Roger liest, was das Dashboard im localStorage abgelegt hat, als Kontext.
 *   • Ruft die Claude API direkt aus dem Browser auf, über den Header
 *     `anthropic-dangerous-direct-browser-access`.
 * ============================================================ -->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --accent: #c6e937; --accent-2: #eaff7a; --bg: #05060c; --fg: #e9ecf5; --muted: rgba(233,236,245,.55); --line: rgba(255,255,255,.1); }
html, body { background: var(--bg); }
body { font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; color: var(--fg); min-height: 100vh; }

.wrap { max-width: 560px; margin: 0 auto; padding: 28px 18px 60px; }
.top { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
.key-toggle { margin-left: auto; border: 1px solid var(--line); background: rgba(255,255,255,.03); border-radius: 10px; padding: 7px 10px; cursor: pointer; font-size: 15px; line-height: 1; opacity: .55; transition: opacity .15s; }
.key-toggle:hover { opacity: 1; }
.key-toggle.has-key { opacity: 1; border-color: var(--accent); }
.keypanel { display: none; }
.keypanel.open { display: block; }

/* ---- Roger: Tennisball-Avatar ---- */
.roger-avatar {
  width: 64px; height: 64px; flex-shrink: 0; position: relative;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.roger-ball-wrap {
  width: 100%; height: 100%; position: relative;
  transform-origin: 50% 60%; will-change: transform;
  animation: rogerIdleFloat 4.2s ease-in-out infinite;
}
.roger-avatar.thinking .roger-ball-wrap { animation-duration: 1.15s; }
.roger-ball { width: 100%; height: 100%; display: block; filter: drop-shadow(0 4px 10px rgba(198, 233, 55, 0.35)); }
.roger-face {
  position: absolute; top: 28%; left: 50%; width: 56%; height: 24%;
  transform: translateX(-50%); display: flex; justify-content: space-between;
  pointer-events: none;
}
.roger-eye {
  position: relative; width: 44%; aspect-ratio: 1 / 1;
  background: #fdfff0; border-radius: 50%;
  box-shadow: inset 0 1px 3px rgba(0,0,0,.25), 0 1px 2px rgba(0,0,0,.15);
  display: flex; align-items: center; justify-content: center;
  transition: transform .1s ease, border-radius .15s ease;
  transform-origin: center;
}
.roger-eye.blink { transform: scaleY(.12); }
.roger-avatar.happy .roger-eye {
  transform: scaleY(.5) translateY(20%);
  border-radius: 50% 50% 35% 35%;
}
.roger-pupil { width: 48%; height: 48%; background: #182408; border-radius: 50%; position: relative; }
.roger-pupil::after {
  content: ''; position: absolute; top: 15%; left: 18%;
  width: 32%; height: 32%; background: rgba(255,255,255,.9); border-radius: 50%;
}
.roger-avatar.click-bounce { animation: rogerClickBounce .55s cubic-bezier(.34,1.56,.64,1); }
@keyframes rogerIdleFloat {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50%      { transform: translateY(-5px) rotate(-2deg); }
}
@keyframes rogerClickBounce {
  0%   { transform: scale(1) rotate(0deg); }
  30%  { transform: scale(.86, 1.14) rotate(-10deg); }
  55%  { transform: scale(1.1, .9) translateY(-16px) rotate(12deg); }
  80%  { transform: scale(.97, 1.03) translateY(2px) rotate(-5deg); }
  100% { transform: scale(1) rotate(0deg); }
}

.title h1 { font-family: 'Times New Roman', Georgia, serif; font-style: italic; font-size: 26px; font-weight: 500;
  background: linear-gradient(90deg, var(--accent-2), var(--accent)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.title .role { font-family: ui-monospace, monospace; font-size: 10px; letter-spacing: .24em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }

/* ---- Schlüssel-Einrichtung ---- */
.keybar { display: flex; gap: 8px; margin-bottom: 16px; }
.keybar input { flex: 1; background: rgba(255,255,255,.03); border: 1px solid var(--line); color: var(--fg); border-radius: 10px; padding: 11px 13px; font-size: 13px; outline: none; }
.keybar input:focus { border-color: var(--accent); }
.keybar button { border: 0; border-radius: 10px; padding: 0 16px; cursor: pointer; color: #10160a; background: var(--accent); font-weight: 600; font-size: 13px; }
.hint { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 18px; }
.hint a { color: var(--accent-2); }
.hint.saved { color: var(--accent); }

/* ---- Chat ---- */
.feed { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.msg { max-width: 90%; }
.msg.user { align-self: flex-end; }
.msg.coach { align-self: flex-start; width: 100%; }
.bubble { border-radius: 14px; padding: 13px 15px; font-size: 14.5px; line-height: 1.55; }
.msg.user .bubble { background: rgba(255,255,255,.05); border: 1px solid var(--line); }
.msg.coach .bubble { background: rgba(255,255,255,.04); border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent); border-left: 3px solid var(--accent); }
.tag { display: inline-block; margin-bottom: 9px; font-family: ui-monospace, monospace; font-size: 9.5px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #10160a; background: var(--accent); padding: 3px 9px; border-radius: 999px; }
.bubble b, .pill { color: var(--accent); font-weight: 700; }
.pill { background: color-mix(in srgb, var(--accent) 18%, transparent); padding: 1px 7px; border-radius: 6px; font-weight: 600; }
.reply-list { margin: 6px 0 0; padding-left: 18px; display: grid; gap: 6px; }
.reply-list li { line-height: 1.45; }
.dots { display: inline-flex; gap: 5px; } .dots i { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: .4; animation: d 1.2s ease-in-out infinite; }
.dots i:nth-child(2){animation-delay:.2s} .dots i:nth-child(3){animation-delay:.4s}
@keyframes d { 0%,100%{opacity:.35;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }

.composer { display: flex; gap: 9px; }
.composer input { flex: 1; background: rgba(255,255,255,.03); border: 1px solid var(--line); color: var(--fg); border-radius: 12px; padding: 13px 15px; font-size: 14.5px; outline: none; }
.composer input:focus { border-color: var(--accent); }
.composer button { width: 50px; border: 0; border-radius: 12px; cursor: pointer; color: #10160a; background: var(--accent); font-size: 18px; }
.composer button:active { transform: scale(.94); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="roger-avatar" id="rogerAvatar">
        <div class="roger-ball-wrap">
          <svg class="roger-ball" viewBox="0 0 200 200" aria-hidden="true">
            <defs>
              <radialGradient id="ballShade" cx="35%" cy="30%" r="75%">
                <stop offset="0%" stop-color="#eaff7a"/>
                <stop offset="55%" stop-color="#c6e937"/>
                <stop offset="100%" stop-color="#9dbf1f"/>
              </radialGradient>
            </defs>
            <circle cx="100" cy="100" r="94" fill="url(#ballShade)"/>
            <path d="M 10 66 C 55 6, 145 6, 190 66" stroke="#fdfff0" stroke-width="10" fill="none" stroke-linecap="round"/>
            <path d="M 10 134 C 55 194, 145 194, 190 134" stroke="#fdfff0" stroke-width="10" fill="none" stroke-linecap="round"/>
          </svg>
          <div class="roger-face">
            <div class="roger-eye" id="rogerEyeL"><div class="roger-pupil" id="rogerPupilL"></div></div>
            <div class="roger-eye" id="rogerEyeR"><div class="roger-pupil" id="rogerPupilR"></div></div>
          </div>
        </div>
      </div>
      <div class="title"><h1>Roger</h1><div class="role">Persönlicher KI-Assistent</div></div>
      <button id="keyToggle" class="key-toggle" aria-label="API-Schlüssel-Einstellungen" title="API-Schlüssel">🔑</button>
    </div>

    <div class="keypanel" id="keypanel">
      <div class="keybar">
        <input id="keyInput" type="password" placeholder="Deinen Anthropic-API-Schlüssel einfügen (sk-ant-…)" autocomplete="off" />
        <button id="keySave">Speichern</button>
      </div>
      <div class="hint" id="hint">
        Dein Schlüssel wird nur in <b>diesem Browser</b> gespeichert und direkt an Anthropic gesendet — niemals an uns.
        Einen Schlüssel bekommst du unter <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">console.anthropic.com</a>.
      </div>
    </div>

    <div class="feed" id="feed"></div>

    <div class="composer">
      <input id="chatInput" placeholder="Frag Roger etwas…" autocomplete="off" />
      <button id="send" aria-label="Senden">→</button>
    </div>
  </div>

<script>
(function(){
  const KEY_LS = 'roger_api_key_v1';
  const feed = document.getElementById('feed');
  const input = document.getElementById('chatInput');
  const keyInput = document.getElementById('keyInput');
  const hint = document.getElementById('hint');
  const keypanel = document.getElementById('keypanel');
  const keyToggle = document.getElementById('keyToggle');
  keyToggle.addEventListener('click', () => keypanel.classList.toggle('open'));

  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  // ============================================================
  // Roger-Avatar: Tennisball mit Comic-Augen, Idle-Animation,
  // Hover-Reaktionen (Blick + Neigung folgen dem Mauszeiger) und
  // einer kurzen Hüpf-Reaktion beim Anklicken. Läuft über eine
  // einzige rAF-Schleife für flüssige, nicht-ruckartige Bewegung.
  // ============================================================
  const RogerAvatar = (function () {
    const el = document.getElementById('rogerAvatar');
    const eyeL = document.getElementById('rogerEyeL');
    const eyeR = document.getElementById('rogerEyeR');
    const pupilL = document.getElementById('rogerPupilL');
    const pupilR = document.getElementById('rogerPupilR');
    if (!el) return { setState() {} };

    const MAX_PUPIL_OFFSET = 3.2;
    const MAX_TILT_DEG = 9;
    const MAX_LEAN_PX = 5;
    const EASE = 0.16;

    let hovering = false;
    let targetTiltX = 0, targetTiltY = 0, curTiltX = 0, curTiltY = 0;
    let targetPupilX = 0, targetPupilY = 0, curPupilX = 0, curPupilY = 0;
    let idlePupilTarget = { x: 0, y: 0 };

    function scheduleIdleLook() {
      const delay = 1400 + Math.random() * 2200;
      setTimeout(() => {
        if (!hovering) {
          idlePupilTarget = {
            x: (Math.random() * 2 - 1) * MAX_PUPIL_OFFSET * 0.6,
            y: (Math.random() * 2 - 1) * MAX_PUPIL_OFFSET * 0.5,
          };
        }
        scheduleIdleLook();
      }, delay);
    }

    function blinkOnce() {
      eyeL.classList.add('blink');
      eyeR.classList.add('blink');
      setTimeout(() => {
        eyeL.classList.remove('blink');
        eyeR.classList.remove('blink');
      }, 140);
    }
    function scheduleBlink() {
      const delay = 2200 + Math.random() * 3600;
      setTimeout(() => { blinkOnce(); scheduleBlink(); }, delay);
    }

    function onPointerMove(e) {
      const rect = el.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const dist = Math.max(Math.hypot(dx, dy), 1);
      const nx = dx / dist, ny = dy / dist;
      targetPupilX = nx * MAX_PUPIL_OFFSET;
      targetPupilY = ny * MAX_PUPIL_OFFSET;
      targetTiltX = ny * -MAX_TILT_DEG * 0.4;
      targetTiltY = nx * MAX_TILT_DEG;
    }
    function onEnter() { hovering = true; }
    function onLeave() { hovering = false; targetTiltX = 0; targetTiltY = 0; }
    function onClick() {
      el.classList.remove('click-bounce');
      void el.offsetWidth; // Reflow erzwingen, damit die Animation neu startet
      el.classList.add('click-bounce');
    }

    function tick() {
      curTiltX += (targetTiltX - curTiltX) * EASE;
      curTiltY += (targetTiltY - curTiltY) * EASE;
      const leanX = hovering ? curTiltY * (MAX_LEAN_PX / MAX_TILT_DEG) : 0;
      const leanY = hovering ? curTiltX * (MAX_LEAN_PX / MAX_TILT_DEG) : 0;
      el.style.transform = 'translate(' + leanX.toFixed(2) + 'px,' + leanY.toFixed(2) + 'px) rotate(' + curTiltY.toFixed(2) + 'deg)';

      const px = hovering ? targetPupilX : idlePupilTarget.x;
      const py = hovering ? targetPupilY : idlePupilTarget.y;
      curPupilX += (px - curPupilX) * EASE;
      curPupilY += (py - curPupilY) * EASE;
      const pupilTransform = 'translate(' + curPupilX.toFixed(2) + 'px,' + curPupilY.toFixed(2) + 'px)';
      pupilL.style.transform = pupilTransform;
      pupilR.style.transform = pupilTransform;

      requestAnimationFrame(tick);
    }

    function setState(state) {
      el.classList.toggle('thinking', state === 'thinking');
      el.classList.toggle('happy', state === 'happy');
    }

    el.addEventListener('mouseenter', onEnter);
    el.addEventListener('mousemove', onPointerMove);
    el.addEventListener('mouseleave', onLeave);
    el.addEventListener('click', onClick);
    scheduleIdleLook();
    scheduleBlink();
    requestAnimationFrame(tick);

    return { setState };
  })();

  // ---- Schlüsselverwaltung ----
  function savedKey(){ try { return localStorage.getItem(KEY_LS) || ''; } catch(e){ return ''; } }
  if (savedKey()) { hint.classList.add('saved'); hint.innerHTML = '✓ Schlüssel gespeichert in diesem Browser. Frag mich etwas.'; keyInput.placeholder = '•••• Schlüssel gespeichert ••••'; keyToggle.classList.add('has-key'); }
  document.getElementById('keySave').addEventListener('click', () => {
    const k = keyInput.value.trim();
    if (!k) return;
    try { localStorage.setItem(KEY_LS, k); } catch(e){}
    keyInput.value = ''; keyInput.placeholder = '•••• Schlüssel gespeichert ••••';
    hint.classList.add('saved'); hint.innerHTML = '✓ Schlüssel gespeichert in diesem Browser. Frag mich etwas.';
    keyToggle.classList.add('has-key');
    keypanel.classList.remove('open');
  });

  // ---- liest, was das Dashboard im localStorage abgelegt hat (als Kontext) ----
  function dashboardData(){
    const out = {};
    for (let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if (k === KEY_LS) continue; // niemals den Schlüssel selbst als Daten senden
      try { out[k] = JSON.parse(localStorage.getItem(k)); } catch(e){ out[k] = localStorage.getItem(k); }
    }
    return out;
  }

  // ---- Rendering: Aufzählungen + **Hervorhebungen** ----
  function inlineMarks(s){ return esc(s).replace(/\*\*(.+?)\*\*/g, '<span class="pill">$1</span>'); }
  function render(text){
    const lines = String(text).split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    const items = [], loose = [];
    for (const l of lines){
      if (/^[-•*]\s+/.test(l)) items.push('<li>' + inlineMarks(l.replace(/^[-•*]\s+/, '')) + '</li>');
      else loose.push(inlineMarks(l));
    }
    let html = loose.join('<br>');
    if (items.length) html += (html ? '<br>' : '') + '<ul class="reply-list">' + items.join('') + '</ul>';
    return html;
  }
  function addUser(t){ const e = document.createElement('div'); e.className = 'msg user'; e.innerHTML = '<div class="bubble">' + esc(t) + '</div>'; feed.appendChild(e); scroll(); }
  function addCoach(html){ const e = document.createElement('div'); e.className = 'msg coach'; e.innerHTML = '<div class="bubble"><span class="tag">Roger</span><div>' + html + '</div></div>'; feed.appendChild(e); scroll(); return e; }
  function scroll(){ window.scrollTo(0, document.body.scrollHeight); }

  const SYS =
    "You are Roger, a friendly, motivating personal AI assistant living inside the user's life-tracking dashboard. " +
    "You can see their saved data (food, water, gym, finance, sleep, goals, etc.). " +
    "Give honest, specific, encouraging guidance. " +
    "Always answer in German (Deutsch). " +
    "Answer in short bullet points starting with '- ', few words each, plain language. " +
    "Wrap key words and numbers in **double asterisks**. " +
    "End with one '- Heute tun:' bullet giving the single action. " +
    "Dashboard data as JSON:\n";

  let busy = false;
  async function ask(text){
    text = (text||'').trim(); if (!text || busy) return;
    const key = savedKey();
    if (!key){ addCoach('- Füge zuerst oben deinen **Anthropic-API-Schlüssel** ein und frag mich dann erneut.'); return; }
    busy = true; addUser(text); input.value = '';
    RogerAvatar.setState('thinking');
    const loading = addCoach('<span class="dots"><i></i><i></i><i></i></span>');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-opus-4-8',
          max_tokens: 1024,
          system: SYS + JSON.stringify(dashboardData()),
          messages: [{ role: 'user', content: text }],
        }),
      });
      const json = await res.json();
      if (json.error){ loading.querySelector('div:last-child').innerHTML = render('- ' + (json.error.message || 'Etwas ist schiefgelaufen — prüfe deinen API-Schlüssel.')); RogerAvatar.setState(''); busy = false; return; }
      const reply = (json.content && json.content[0] && json.content[0].text) || 'Hmm, keine Antwort.';
      loading.querySelector('div:last-child').innerHTML = render(reply);
      RogerAvatar.setState('happy'); setTimeout(() => RogerAvatar.setState(''), 2500);
    } catch(e){
      loading.querySelector('div:last-child').innerHTML = render('- Konnte Anthropic nicht erreichen — prüfe deine Verbindung und deinen Schlüssel.');
      RogerAvatar.setState('');
    }
    busy = false;
  }

  document.getElementById('send').addEventListener('click', () => ask(input.value));
  input.addEventListener('keydown', e => { if (e.key === 'Enter') ask(input.value); });

  addCoach('Hey — ich bin <b>Roger</b>. Füge oben deinen Schlüssel ein und frag mich zu Ernährung, Training, Schlaf oder wo du anfangen sollst. Ich halte es kurz und gebe dir <b>eine Sache, die du tun kannst</b>.');
})();
</script>
</body>
</html>
