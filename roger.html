<html lang="de">
<head>

<title>Roger · Mentor</title>
<!-- ============================================================
 * ROGER — persönlicher KI-Mentor, lebt im Dashboard.
 * Einzelne, in sich geschlossene Datei. Kein Backend, kein Build-Schritt.
 *
 * FUNKTIONSWEISE (bring-your-own-key, bewusst so gewählt — siehe
 * Sicherheits-Audit-Ausnahme: der Anthropic-Key bleibt Browser-only):
 *   • Du fügst deinen EIGENEN Anthropic-API-Schlüssel ein (nur im
 *     Browser-localStorage unter "roger_api_key" gespeichert — geht
 *     nirgendwo außer direkt an Anthropic).
 *   • Roger liest, was das Dashboard im localStorage abgelegt hat, als
 *     Kontext — mit Ausnahme von Dingen, die nie das Gerät verlassen
 *     sollten (WHOOP-OAuth-Tokens, Fortschrittsfotos werden auf reine
 *     Metadaten gekürzt).
 *   • Ruft die Claude API direkt aus dem Browser auf, über den Header
 *     `anthropic-dangerous-direct-browser-access`.
 * ============================================================ -->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #4ADE80;
  --accent-soft: #A7F3D0;
  --bg: #070808;
  --fg: #EDEFEA;
  --muted: rgba(237,239,234,.55);
  --line: rgba(255,255,255,.09);
  --glass: rgba(255,255,255,.045);
  --glass-strong: rgba(255,255,255,.07);
}

html, body { background: var(--bg); }
body {
  font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
  color: var(--fg);
  min-height: 100vh;
  background-color: var(--bg);
  background-image: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJAAAACQCAIAAABoJHXvAAADPElEQVR4nO3bwU7bQBRAUcewBWWFoB+A+P8vs8qaqouK1DX2zJt5Holb3VmBFHz09BIlwbqX19e3aZqWZZlazvv7z6bHX6/XaZoeHh61kta8/mXQ2VxcK2PNt+fFIO922WVZtPLWPK1ey6d7a2nzg1afNY/zvk6llbfmQd7RVFpJa14/4iyvPJVWxpo3j8t7kam0uq3twpJefCqtPmtnYd1e61RaHdb+wjq8vqm0Wq3DhTV5mam0mqzSwoJefiqtuFVZWNU7ayqtoFVfWME7dyqtyHVCC9v1RkylVT2Xp6fnOHkDbvdymqb6c99IK2NFX2G7lz79OahVPfet9z3v7ubp8zn18fGr6W+18lbbK+zoDXPE0do9DQtbv0P2/d9FK29FF/b188y42bQKJ7Swo0+fI2bTKp/6wsrfFc6dTat6qcrCIt/szppNK2KVFhb/Hp6fTStoHS6s9b8mmdm04tb+wlqluKeVtHYW1icFPa2ktV1YRop4Wknrn4XlpaqnlbT+LuwsqexpJa1tbnSKVPC0ktY8SDrytJLW5eXlR4f0v97P/f7WNjcacTYX18pY99//HqvW2rJxhlk2zjDLxhlm2TjDLBtnmGXjDLNsnGGWjTPMsnGGWTbOMMvGGWbZOMMsG2eYZeMMs2ycYZaNM8yycYZZNs4wy8YZZtk4wywbZ5hl4wyzbJxhlo0zzLJxhlk2zjDLxhlm2TjDLBtnmGXjDLNsnGGWjTPMsnGGWTbOMMvGGWbZOMMsG2eYZeMMs2ycYZaNM8yycYZZNs4wy8YZZtk4wywbZ5hl4wyzbJxhlo0zzLJxhlk2zjDLxhlm2TjDLBtnmGXjDLNsnGGWjTPMsnGGWTbOMMvGGWbZOMMsG2eYZeMMs2ycYZaNM8yycYZZNs4wy8YZZtk4wywbZ5hl4wyzbJxhlo0zzLJxhlk2zjDLxhlm2TjDLBtnmGXjDLNsnGGWjTPMsnGGWTbOMMvGGWb9Bj67uGZjGVJxAAAAAElFTkSuQmCC");
  background-repeat: repeat;
  background-size: 144px 144px;
  background-attachment: fixed;
}

.wrap { max-width: 560px; margin: 0 auto; padding: max(20px, env(safe-area-inset-top)) 18px 60px; }

.back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 600; margin-bottom: 14px; }
.back-link:hover { color: var(--fg); }

/* ---- top bar: glass pill, same construction as the app's bottom nav pill ---- */
.top {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 20px;
  background: var(--glass);
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  border: 1px solid var(--line);
  border-radius: 26px;
  padding: 10px 14px;
  box-shadow: 0 6px 22px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.05);
}
.key-toggle {
  margin-left: auto; border: 1px solid var(--line);
  background: rgba(255,255,255,.04);
  border-radius: 999px; width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 15px; opacity: .6; transition: opacity .15s, border-color .15s;
}
.key-toggle:hover { opacity: 1; }
.key-toggle.has-key { opacity: 1; border-color: color-mix(in srgb, var(--accent) 55%, var(--line)); }
.keypanel { display: none; margin-bottom: 18px; }
.keypanel.open { display: block; }

/* ---- Tennisball-Avatar ---- */
.ball-wrap { width: 52px; height: 52px; flex-shrink: 0; animation: ballBounce 2.4s ease-in-out infinite; filter: drop-shadow(0 5px 6px rgba(0,0,0,.45)); }
.ball {
  width: 100%; height: 100%; border-radius: 50%; position: relative; overflow: hidden;
  background:
    repeating-radial-gradient(circle at 22% 18%, rgba(255,255,255,.10) 0 0.6px, transparent 0.6px 2.4px),
    repeating-radial-gradient(circle at 70% 65%, rgba(0,0,0,.10) 0 0.6px, transparent 0.6px 2.6px),
    radial-gradient(circle at 32% 28%, #f4ffb0 0%, #e4f76a 16%, #cbe83a 36%, #a9cf1f 58%, #7fa412 78%, #5c7d0d 94%, #4a680a 100%);
  box-shadow:
    0 0 20px -4px rgba(205,234,31,.65),
    inset 0 -10px 16px rgba(0,0,0,.40),
    inset 0 6px 10px rgba(255,255,255,.28),
    inset 0 0 0 1px rgba(0,0,0,.12);
}
.ball::after {
  content: "";
  position: absolute; top: 14%; left: 24%; width: 26%; height: 16%;
  background: radial-gradient(ellipse at center, rgba(255,255,255,.85), rgba(255,255,255,0) 72%);
  border-radius: 50%;
  transform: rotate(-18deg);
  pointer-events: none;
}
.seam { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
.seam path { fill: none; stroke-linecap: round; }
.seam .halo   { stroke: #f2fbe4; stroke-width: 7.5; opacity: .55; filter: blur(1px); }
.seam .core   { stroke: #fdfff5; stroke-width: 4.4; opacity: .95; }
.seam .shadow { stroke: rgba(0,0,0,.22); stroke-width: 4.4; opacity: .6; transform: translate(0.6px, 0.9px); }

.ball-wrap.think { animation: ballBounce 0.85s ease-in-out infinite; }
.ball-wrap.think .ball { animation: ballWobble 0.9s ease-in-out infinite; }
.ball-wrap.happy { animation: ballPop 0.55s ease-out; }

@keyframes ballBounce {
  0%,100% { transform: translateY(0) scaleX(1) scaleY(1); }
  45% { transform: translateY(-9px) scaleX(1) scaleY(1); }
  50% { transform: translateY(-9px) scaleX(1.05) scaleY(.95); }
  55% { transform: translateY(-9px) scaleX(1) scaleY(1); }
  95% { transform: translateY(0) scaleX(1.08) scaleY(.9); }
}
@keyframes ballWobble { 0%,100% { transform: rotate(0deg); } 25% { transform: rotate(-9deg); } 75% { transform: rotate(9deg); } }
@keyframes ballPop { 0% { transform: scale(1); } 35% { transform: scale(1.22); } 100% { transform: scale(1); } }

.title h1 {
  font-family: 'Times New Roman', Georgia, serif; font-style: italic; font-weight: 500; font-size: 24px;
  background: linear-gradient(90deg, var(--accent-soft), var(--accent));
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.title .role { font-family: ui-monospace, monospace; font-size: 9.5px; letter-spacing: .24em; text-transform: uppercase; color: var(--muted); margin-top: 2px; }

.keybar { display: flex; gap: 8px; margin-bottom: 12px; }
.keybar input {
  flex: 1; background: var(--glass); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--line); color: var(--fg); border-radius: 999px; padding: 12px 16px; font-size: 13px; outline: none;
}
.keybar input:focus { border-color: color-mix(in srgb, var(--accent) 60%, var(--line)); }
.keybar button {
  border: 1px solid color-mix(in srgb, var(--accent) 55%, var(--line)); border-radius: 999px; padding: 0 18px; cursor: pointer;
  color: #06210f; background: var(--accent); font-weight: 600; font-size: 13px;
}
.hint { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 18px; padding: 0 4px; }
.hint a { color: var(--accent-soft); }
.hint.saved { color: var(--accent); }

.feed { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.msg { max-width: 90%; }
.msg.user { align-self: flex-end; }
.msg.coach { align-self: flex-start; width: 100%; }
.bubble {
  border-radius: 20px; padding: 14px 16px; font-size: 14.5px; line-height: 1.55;
  backdrop-filter: blur(16px) saturate(140%); -webkit-backdrop-filter: blur(16px) saturate(140%);
  box-shadow: 0 4px 20px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.05);
}
.msg.user .bubble { background: var(--glass-strong); border: 1px solid var(--line); }
.msg.coach .bubble { background: var(--glass); border: 1px solid var(--line); border-left: 3px solid var(--accent); }
.tag {
  display: inline-block; margin-bottom: 9px; font-family: ui-monospace, monospace; font-size: 9.5px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase; color: #06210f; background: var(--accent); padding: 3px 10px; border-radius: 999px;
}
.bubble b, .pill { color: var(--accent); font-weight: 700; }
.pill { background: color-mix(in srgb, var(--accent) 16%, transparent); padding: 1px 7px; border-radius: 6px; font-weight: 600; }
.reply-list { margin: 6px 0 0; padding-left: 18px; display: grid; gap: 6px; }
.reply-list li { line-height: 1.45; }
.dots { display: inline-flex; gap: 5px; } .dots i { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: .4; animation: d 1.2s ease-in-out infinite; }
.dots i:nth-child(2){animation-delay:.2s} .dots i:nth-child(3){animation-delay:.4s}
@keyframes d { 0%,100%{opacity:.35;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }

.composer {
  position: sticky; bottom: max(14px, env(safe-area-inset-bottom));
  display: flex; gap: 9px; align-items: center;
  background: var(--glass); backdrop-filter: blur(18px) saturate(140%); -webkit-backdrop-filter: blur(18px) saturate(140%);
  border: 1px solid var(--line); border-radius: 999px; padding: 8px 8px 8px 18px;
  box-shadow: 0 6px 22px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.05);
}
.composer input { flex: 1; background: transparent; border: 0; color: var(--fg); font-size: 14.5px; outline: none; }
.composer input::placeholder { color: var(--muted); }
.composer button {
  width: 42px; height: 42px; border: 0; border-radius: 50%; cursor: pointer; color: #06210f; background: var(--accent); font-size: 17px;
  flex-shrink: 0; box-shadow: 0 0 14px -3px var(--accent);
}
.composer button:active { transform: scale(.94); }
</style>
</head>
<body>
  <div class="wrap">
    <a href="main.html" class="back-link">← Startseite</a>
    <div class="top">
      <div class="ball-wrap" id="orb">
        <div class="ball">
          <svg class="seam" viewBox="0 0 100 100" preserveAspectRatio="none">
            <path class="shadow" d="M14,2 C42,22 42,50 30,50 C42,50 42,78 14,98" />
            <path class="halo"   d="M14,2 C42,22 42,50 30,50 C42,50 42,78 14,98" />
            <path class="core"   d="M14,2 C42,22 42,50 30,50 C42,50 42,78 14,98" />
            <path class="shadow" d="M86,2 C58,22 58,50 70,50 C58,50 58,78 86,98" />
            <path class="halo"   d="M86,2 C58,22 58,50 70,50 C58,50 58,78 86,98" />
            <path class="core"   d="M86,2 C58,22 58,50 70,50 C58,50 58,78 86,98" />
          </svg>
        </div>
      </div>
      <div class="title"><h1>Roger</h1><div class="role">dein Mentor</div></div>
      <button id="keyToggle" class="key-toggle" aria-label="API-Schlüssel" title="API-Schlüssel">🔑</button>
    </div>

    <div class="keypanel" id="keypanel">
      <div class="keybar">
        <input id="keyInput" type="password" placeholder="Deinen Anthropic-API-Schlüssel einfügen (sk-ant-…)" autocomplete="off" />
        <button id="keySave">Speichern</button>
      </div>
      <div class="hint" id="hint">
        Dein Schlüssel bleibt nur in <b>diesem Browser</b> gespeichert und geht direkt an Anthropic — nie an uns.
        Einen eigenen holen unter <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">console.anthropic.com</a>.
      </div>
    </div>

    <div class="feed" id="feed"></div>

    <div class="composer">
      <input id="chatInput" placeholder="Frag Roger irgendwas…" autocomplete="off" />
      <button id="send" aria-label="Senden">→</button>
    </div>
  </div>

<script>
(function(){
  const KEY_LS = 'roger_api_key';
  // Keys, die nie an Anthropic geschickt werden — auch wenn sie im
  // localStorage stehen. WHOOP-Tokens sind echte OAuth-Secrets, keine
  // Kontextinformation, und Fotos werden unten auf reine Metadaten gekürzt.
  const NEVER_SEND = new Set([KEY_LS, 'whoop_tokens_v1']);
  const STRIP_PHOTOS_FROM = ['po_coach_photos'];

  const feed = document.getElementById('feed');
  const input = document.getElementById('chatInput');
  const orb = document.getElementById('orb');
  const keyInput = document.getElementById('keyInput');
  const hint = document.getElementById('hint');
  const keypanel = document.getElementById('keypanel');
  const keyToggle = document.getElementById('keyToggle');
  keyToggle.addEventListener('click', () => keypanel.classList.toggle('open'));

  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function setOrb(s){ orb.className = 'ball-wrap' + (s ? ' ' + s : ''); }

  // ---- Key-Handling ----
  function savedKey(){ try { return localStorage.getItem(KEY_LS) || ''; } catch(e){ return ''; } }
  if (savedKey()) { hint.classList.add('saved'); hint.innerHTML = '✓ Schlüssel gespeichert. Frag los.'; keyInput.placeholder = '•••• Schlüssel gespeichert ••••'; keyToggle.classList.add('has-key'); }
  document.getElementById('keySave').addEventListener('click', () => {
    const k = keyInput.value.trim();
    if (!k) return;
    try { localStorage.setItem(KEY_LS, k); } catch(e){}
    keyInput.value = ''; keyInput.placeholder = '•••• Schlüssel gespeichert ••••';
    hint.classList.add('saved'); hint.innerHTML = '✓ Schlüssel gespeichert. Frag los.';
    keyToggle.classList.add('has-key');
    keypanel.classList.remove('open');
  });

  // ---- liest, was das Dashboard im localStorage abgelegt hat ----
  function dashboardData(){
    const out = {};
    for (let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if (!k || NEVER_SEND.has(k)) continue;
      let val;
      try { val = JSON.parse(localStorage.getItem(k)); } catch(e){ val = localStorage.getItem(k); }
      if (STRIP_PHOTOS_FROM.indexOf(k) !== -1 && Array.isArray(val)) {
        val = val.map((p) => p && typeof p === 'object' ? { id: p.id, dateKey: p.dateKey, weight: p.weight } : p);
      }
      out[k] = val;
    }
    return out;
  }

  // ---- Rendering: Bullets + **Pills** ----
  function inlineMarks(s){ return esc(s).replace(/\*\*(.+?)\*\*/g, '<span class="pill">$1</span>'); }
  function render(text){
    const lines = String(text).split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    const items = [], loose = [];
    for (const l of lines){
      if (/^[-•*]\s+/.test(l)) items.push('<li>' + inlineMarks(l.replace(/^[-•*]\s+/, '')) + '</li>');
      else loose.push(inlineMarks(l));
    }
    let html = loose.join('<br>');
    if (items.length) html += (html ? '<br>' : '') + '<ul class="reply-list">' + items.join('') + '</ul>';
    return html;
  }
  function addUser(t){ const e = document.createElement('div'); e.className = 'msg user'; e.innerHTML = '<div class="bubble">' + esc(t) + '</div>'; feed.appendChild(e); scroll(); }
  function addCoach(html){ const e = document.createElement('div'); e.className = 'msg coach'; e.innerHTML = '<div class="bubble"><span class="tag">Roger</span><div>' + html + '</div></div>'; feed.appendChild(e); scroll(); return e; }
  function scroll(){ window.scrollTo(0, document.body.scrollHeight); }

  const SYS =
    "Du bist Roger, ein persönlicher Mentor im Leben-Tracking-Dashboard des Nutzers (Maël, 14 Jahre, " +
    "Leistungstennisspieler mit dem Ziel ATP Top 80 und Tennis-Trainer-A-Lizenz). " +
    "Du siehst seine gespeicherten Daten (Essen, Wasser, Training, Finanzen, Schlaf, Ziele usw.). " +
    "Gib ehrliche, konkrete, ermutigende Hinweise, altersgerecht für einen 14-Jährigen. " +
    "Antworte in kurzen Stichpunkten, die mit '- ' beginnen, wenige Worte je Punkt, einfache Sprache. " +
    "Wichtige Wörter und Zahlen in **doppelten Sternchen** hervorheben. " +
    "Antworte auf Deutsch. " +
    "Beende jede Antwort mit einem '- Heute tun:'-Stichpunkt mit der einen konkreten Aktion. " +
    "Dashboard-Daten als JSON:\n";

  let busy = false;
  async function ask(text){
    text = (text||'').trim(); if (!text || busy) return;
    const key = savedKey();
    if (!key){ addCoach('- Füg oben zuerst deinen **Anthropic-API-Schlüssel** ein, dann frag mich nochmal.'); return; }
    busy = true; addUser(text); input.value = '';
    setOrb('think');
    const loading = addCoach('<span class="dots"><i></i><i></i><i></i></span>');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1024,
          system: SYS + JSON.stringify(dashboardData()),
          messages: [{ role: 'user', content: text }],
        }),
      });
      const json = await res.json();
      if (json.error){ loading.querySelector('div:last-child').innerHTML = render('- ' + (json.error.message || 'Etwas ist schiefgelaufen — prüf deinen API-Schlüssel.')); setOrb(''); busy = false; return; }
      const reply = (json.content && json.content[0] && json.content[0].text) || 'Hmm, keine Antwort.';
      loading.querySelector('div:last-child').innerHTML = render(reply);
      setOrb('happy'); setTimeout(() => setOrb(''), 2500);
    } catch(e){
      loading.querySelector('div:last-child').innerHTML = render('- Konnte Anthropic nicht erreichen — prüf Verbindung und Schlüssel.');
      setOrb('');
    }
    busy = false;
  }

  document.getElementById('send').addEventListener('click', () => ask(input.value));
  input.addEventListener('keydown', e => { if (e.key === 'Enter') ask(input.value); });

  addCoach('Hey — ich bin <b>Roger</b>. Füg oben deinen Schlüssel ein und frag mich zu Essen, Training, Schlaf oder wo du anfangen sollst. Ich halte es kurz und geb dir <b>eine Sache zum Umsetzen</b>.');
})();
</script>
</body>
</html>
