<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Maëls Übersicht">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/apple-touch-icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/apple-touch-icon-167.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<title>Gesundheit</title>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<link rel="stylesheet" href="theme.css">
<style>
:root { --good: var(--accent); }
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); }
body { color: var(--text-1); font-family: var(--font); -webkit-font-smoothing: antialiased; min-height: 100vh; padding: max(24px, env(safe-area-inset-top)) 18px 40px; }
.wrap { max-width: 640px; margin: 0 auto; }
.hd { margin-bottom: 22px; }
.hd h1 { margin: 0; font-size: 26px; }
.hd .sub { margin-top: 4px; font-size: 13px; color: var(--text-3); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.06em; }

.tile-row { margin-bottom: 16px; }
.section-card { margin-bottom: 16px; }
.stack-hint { margin-top: 4px; font-size: 12.5px; color: var(--text-3); text-align: center; }
.stack-hint a { color: var(--text-2); }
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <h1 class="rw-title">Gesundheit</h1>
    <div class="sub rw-eyebrow" id="wellDateLabel">—</div>
  </div>

  <a href="recovery.html" class="rw-card rw-tracker rw-card-photo rw-card-photo--forest section-card">
    <div class="rw-tracker-title">Erholung</div>
    <div class="rw-tracker-val" id="scoreNum">—</div>
    <div class="rw-tracker-bar"><span id="scoreBar" style="width:0%"></span></div>
  </a>

  <div class="tile-row rw-tile-row">
    <a href="nutrition.html" class="rw-card rw-tile">
      <div class="rw-tile-icon">🍎</div>
      <div class="rw-tile-title">Essen</div>
    </a>
    <a href="po-water.html" class="rw-card rw-tile">
      <div class="rw-tile-icon">💧</div>
      <div class="rw-tile-title">Wasser</div>
    </a>
  </div>

  <a href="caffeine.html" class="rw-card rw-title-card rw-card-photo rw-card-photo--coffee section-card">
    <div class="rw-title-card-t">☕ Kaffee Tracker</div>
  </a>

  <div class="rw-section-title">WHOOP Erholungsdaten</div>
  <div class="rw-card rw-multistat section-card" style="--cols:4" id="statGrid"></div>

  <div class="stack-hint" id="stackHint">Nahrungsergänzung verwalten? Auf der <a href="health.html">Daily-Stack-Seite</a>.</div>
</div>

<script>
(function () {
  'use strict';

  const WHOOP_KEY = 'whoop_tokens_v1';
  function loadWhoopTokens() { try { return JSON.parse(localStorage.getItem(WHOOP_KEY)); } catch (e) { return null; } }
  function saveWhoopTokens(t) { try { localStorage.setItem(WHOOP_KEY, JSON.stringify(t)); } catch (e) {} }
  async function refreshWhoopToken(t) {
    if (!t.refresh) return null;
    try {
      const r = await fetch('/api/whoop-refresh', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ refresh_token: t.refresh }) });
      const j = await r.json();
      if (j.access_token) {
        const next = { access: j.access_token, refresh: j.refresh_token || t.refresh, expires: Date.now() + (j.expires_in || 3500) * 1000 };
        saveWhoopTokens(next);
        return next;
      }
    } catch (e) {}
    return null;
  }
  async function whoopFetch(path, t) {
    const [p, qs] = path.split('?');
    const params = new URLSearchParams(qs || ''); params.set('path', p);
    const r = await fetch('/api/whoop-data?' + params.toString(), { headers: { Authorization: 'Bearer ' + t.access, Accept: 'application/json' } });
    if (r.status === 401) { const n = await refreshWhoopToken(t); if (n) return whoopFetch(path, n); throw new Error('unauthorized'); }
    if (!r.ok) throw new Error('WHOOP ' + r.status);
    return await r.json();
  }

  function zoneColor(score) {
    if (score == null) return 'rgba(255,255,255,0.5)';
    if (score >= 67) return 'var(--good)';
    if (score >= 34) return 'var(--warn)';
    return 'var(--bad)';
  }
  function renderTracker(score) {
    const numEl = document.getElementById('scoreNum');
    numEl.textContent = score != null ? score + '%' : '—';
    numEl.style.color = zoneColor(score);
    const bar = document.getElementById('scoreBar');
    bar.style.width = score != null ? score + '%' : '0%';
    bar.style.background = zoneColor(score);
  }
  function statCol(icon, label, val) {
    return '<div class="rw-multistat-col"><div class="rw-multistat-icon">' + icon + '</div><div class="rw-multistat-val">' + val + '</div><div class="rw-multistat-label">' + label + '</div></div>';
  }

  async function boot() {
    const dLabel = document.getElementById('wellDateLabel');
    const days = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
    const mons = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
    const now = new Date();
    dLabel.textContent = days[now.getDay()] + ', ' + now.getDate() + '. ' + mons[now.getMonth()];

    const tokens = loadWhoopTokens();
    if (!tokens || !tokens.access) {
      document.getElementById('statGrid').innerHTML =
        statCol('😴', 'Schlaf', '—') + statCol('🔥', 'Strain', '—') +
        statCol('💚', 'HRV', '—') + statCol('❤️', 'Ruhepuls', '—');
      renderTracker(null);
      return;
    }

    try {
      let t = tokens;
      if (t.expires && Date.now() > t.expires - 60000) { const n = await refreshWhoopToken(t); if (n) t = n; }
      const [rec, sleep, cycle] = await Promise.all([
        whoopFetch('/recovery?limit=1', t).catch(() => null),
        whoopFetch('/activity/sleep?limit=1', t).catch(() => null),
        whoopFetch('/cycle?limit=1', t).catch(() => null),
      ]);
      const r = rec && rec.records && rec.records[0] && rec.records[0].score;
      const s = sleep && sleep.records && sleep.records[0] && sleep.records[0].score;
      const c = cycle && cycle.records && cycle.records[0] && cycle.records[0].score;

      const score = r ? Math.round(r.recovery_score) : null;
      renderTracker(score);

      const sleepPerf = s && s.sleep_performance_percentage != null ? Math.round(s.sleep_performance_percentage) : null;
      const strain = c && c.strain != null ? c.strain.toFixed(1) : null;
      const hrv = r && r.hrv_rmssd_milli != null ? Math.round(r.hrv_rmssd_milli) : null;
      const rhr = r && r.resting_heart_rate != null ? Math.round(r.resting_heart_rate) : null;

      document.getElementById('statGrid').innerHTML =
        statCol('😴', 'Schlaf', sleepPerf != null ? sleepPerf + '%' : '—') +
        statCol('🔥', 'Strain', strain != null ? strain : '—') +
        statCol('💚', 'HRV', hrv != null ? hrv + ' ms' : '—') +
        statCol('❤️', 'Ruhepuls', rhr != null ? rhr + ' bpm' : '—');
    } catch (e) {
      renderTracker(null);
    }
  }

  boot();
})();
</script>
</body>
</html>
